name: ShellCheck

"on":
  pull_request:
    branches: [main]
    paths:
      - "**/*.sh"
      - ".shellcheckrc"
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install ShellCheck
        run: |
          if ! command -v shellcheck &>/dev/null; then
            sudo apt-get update && sudo apt-get install -y shellcheck
          fi
          shellcheck --version

      - name: Find changed shell scripts
        id: changed
        run: |
          set -o errexit -o nounset -o pipefail
          base="${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha }}"
          if [[ -z "$base" ]]; then
            echo "No base SHA found, checking all scripts"
            find . -name '*.sh' -type f -not -path './vendor/*' > /tmp/scripts.txt
          else
            git diff --name-only --diff-filter=ACMR "$base"...HEAD -- '*.sh' > /tmp/scripts.txt || true
          fi
          if [[ -s /tmp/scripts.txt ]]; then
            echo "has_scripts=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_scripts=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run ShellCheck on changed scripts
        if: steps.changed.outputs.has_scripts == 'true'
        run: |
          set -o errexit -o nounset -o pipefail
          mapfile -t scripts < /tmp/scripts.txt
          echo "Checking ${#scripts[@]} changed script(s):"
          printf '  %s\n' "${scripts[@]}"
          shellcheck --severity=warning "${scripts[@]}"
