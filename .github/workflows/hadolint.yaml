name: Hadolint

"on":
  pull_request:
    branches: [main]
    paths:
      - "**/Dockerfile*"
      - ".hadolint.yaml"
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

jobs:
  hadolint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run Hadolint on Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          config: .hadolint.yaml
